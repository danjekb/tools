name: Sprawdź poprawki PIN (4 cyfry)

on:
  workflow_dispatch:
    inputs:
      services_jar_url:
        description: "URL do services.jar (z Twojego ROM-u)"
        required: true
      secsettings_apk_url:
        description: "URL do SecSettings.apk (z Twojego ROM-u)"
        required: true

jobs:
  check-pin-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Pobierz kod repozytorium
        uses: actions/checkout@v4

      - name: Zainstaluj Java (wymagane dla apktool)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Pobierz i skonfiguruj apktool
        run: |
          wget -q https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.7.0.jar -O apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O apktool
          chmod +x apktool
          ./apktool --version

      - name: Pobierz pliki ROM-u
        run: |
          curl -fSL -o services.jar "${{ inputs.services_jar_url }}" || {
            echo "❌ Błąd: Nie udało się pobrać services.jar"
            exit 1
          }
          curl -fSL -o SecSettings.apk "${{ inputs.secsettings_apk_url }}" || {
            echo "❌ Błąd: Nie udało się pobrać SecSettings.apk"
            exit 1
          }
          ls -lh

      - name: Decompiluj i sprawdź pliki
        run: |
          mkdir -p services_decompiled secsettings_decompiled

          # Dekompilacja z obsługą błędów
          ./apktool d services.jar -o services_decompiled -q --force || echo "⚠️  services.jar nie został pomyślnie rozpakowany"
          ./apktool d SecSettings.apk -o secsettings_decompiled -q --force || echo "⚠️  SecSettings.apk nie został pomyślnie rozpakowany"

          # Utwórz raport
          {
            echo "=== 📋 Raport: Sprawdzanie poprawek PIN (4 cyfry) ==="
            echo "Data: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "--- services.jar ---"
            if [ -d services_decompiled ] && grep -rq --include="*.smali" "const/4.*0x6" services_decompiled/ 2>/dev/null; then
              echo "✅ Znaleziono 'const/4.*0x6' w services.jar → POPRAWKA BĘDZIE DZIAŁAĆ!"
              grep -rn --include="*.smali" "const/4.*0x6" services_decompiled/
            else
              echo "❌ NIE znaleziono 'const/4.*0x6' w services.jar → Sprawdź inne lokalizacje!"
            fi
            echo ""
            echo "--- SecSettings.apk ---"
            if [ -d secsettings_decompiled ] && grep -rq --include="*.smali" "const/4.*0x6" secsettings_decompiled/ 2>/dev/null; then
              echo "✅ Znaleziono 'const/4.*0x6' w SecSettings.apk → POPRAWKA BĘDZIE DZIAŁAĆ!"
              grep -rn --include="*.smali" "const/4.*0x6" secsettings_decompiled/
            else
              echo "❌ NIE znaleziono 'const/4.*0x6' w SecSettings.apk → Sprawdź inne lokalizacje!"
            fi
          } > report.txt

          cat report.txt

      - name: Zapisz raport jako artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: raport-poprawek-pin
          path: report.txt
          retention-days: 30
