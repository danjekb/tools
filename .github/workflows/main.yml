name: Pobierz i dodaj plik do repozytorium

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Adres URL pliku do pobrania'
        required: true
        type: string
      file_name:
        description: 'Nazwa docelowa pliku (np. obrazek.jpg lub dane/plik.json)'
        required: true
        type: string

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    # Nadajemy uprawnienia do zapisu w repozytorium
    permissions:
      contents: write

    steps:
    # 1. Klonowanie repozytorium
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Tworzenie folderu (jeśli podano ścieżkę, np. dane/plik.txt)
    - name: Create directory if needed
      run: |
        mkdir -p "$(dirname "${{ inputs.file_name }}")"

    # 3. Pobieranie pliku za pomocą curl
    - name: Download file
      run: |
        curl -L -o "${{ inputs.file_name }}" "${{ inputs.file_url }}"

    # 4. Commit i Push zmian
    - name: Commit and Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add "${{ inputs.file_name }}"
        
        # Sprawdzamy czy plik faktycznie się zmienił/doszedł, żeby nie wywalić błędu przy pustym commicie
        if git diff --staged --quiet; then
          echo "Plik już istnieje i nie uległ zmianie."
        else
          git commit -m "Automatyczne dodanie pliku: ${{ inputs.file_name }}"
          git push
        fi
