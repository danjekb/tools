name: Pobierz i dodaj plik do repozytorium

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Adres URL pliku do pobrania'
        required: true
        type: string

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    # 1. Klonowanie repozytorium
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Wyciąganie nazwy pliku z linku i pobieranie
    - name: Download file
      run: |
        # Pobieramy pełny URL z inputu
        URL="${{ inputs.file_url }}"
        
        # Odcinamy wszystko przed ostatnim slashem oraz ewentualne parametry po pytajniku (query params)
        FILE_NAME=$(basename "$URL" | cut -d? -f1)
        
        echo "Wykryta nazwa pliku: $FILE_NAME"
        
        # Pobieramy plik pod oryginalną nazwą
        curl -L -o "$FILE_NAME" "$URL"
        
        # Zapisujemy nazwę do zmiennej środowiskowej, żeby użyć jej w kolejnym kroku
        echo "DOWNLOADED_FILE=$FILE_NAME" >> $GITHUB_ENV

    # 3. Commit i Push zmian
    - name: Commit and Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add "$DOWNLOADED_FILE"
        
        if git diff --staged --quiet; then
          echo "Plik o nazwie $DOWNLOADED_FILE już istnieje w repozytorium i nie zmienił zawartości."
        else
          git commit -m "Automatyczne dodanie pliku: $DOWNLOADED_FILE"
          git push
        fi
