name: Find ALL PIN constants

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download files
        run: |
          wget -O services.jar https://github.com/danjekb/tools/releases/download/1.0/services.jar
          wget -O SecSettings.apk https://github.com/danjekb/tools/releases/download/1.0/SecSettings.apk

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk

      - name: Download and setup apktool
        run: |
          wget -O apktool https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          chmod +x apktool
          sudo mv apktool /usr/local/bin/
          wget -O apktool.jar https://github.com/iBotPeaches/Apktool/releases/download/v3.0.2/apktool_3.0.2.jar
          sudo mv apktool.jar /usr/local/bin/

      - name: Decompile services.jar
        run: |
          mkdir -p services_decompiled
          cd services_decompiled
          apktool d ../services.jar

      - name: Decompile SecSettings.apk
        run: |
          mkdir -p secsettings_decompiled
          cd secsettings_decompiled
          apktool d ../SecSettings.apk

      - name: Search ALL smali for const with 6
        run: |
          echo "=== ALL const/4 0x6 in services ==="
          grep -r -n "const/4.*0x6" services_decompiled/smali/ | head -200
          echo ""
          echo "=== ALL const/16 0x6 in services ==="
          grep -r -n "const/16.*0x6" services_decompiled/smali/ | head -200
          echo ""
          echo "=== ALL const/4 0x6 in SecSettings ==="
          grep -r -n "const/4.*0x6" secsettings_decompiled/smali/ | head -200
          echo ""
          echo "=== ALL const/16 0x6 in SecSettings ==="
          grep -r -n "const/16.*0x6" secsettings_decompiled/smali/ | head -200

      - name: Search for PIN-related strings
        run: |
          echo "=== Files containing 'pinlength' in services ==="
          grep -r -i -l "pinlength" services_decompiled/smali/ || echo "None"
          echo ""
          echo "=== Files containing 'minpin' in services ==="
          grep -r -i -l "minpin" services_decompiled/smali/ || echo "None"
          echo ""
          echo "=== Files containing 'autoconfirm' in services ==="
          grep -r -i -l "autoconfirm" services_decompiled/smali/ || echo "None"
          echo ""
          echo "=== Same in SecSettings ==="
          grep -r -i -l "pinlength" secsettings_decompiled/smali/ || echo "None"
          grep -r -i -l "minpin" secsettings_decompiled/smali/ || echo "None"
          grep -r -i -l "autoconfirm" secsettings_decompiled/smali/ || echo "None"

      - name: Find all methods with 'PIN' or 'password' in name (services)
        run: |
          echo "=== Methods containing 'Pin' in name (services) ==="
          grep -r -n ".method.*Pin" services_decompiled/smali/ | head -100

      - name: Find all methods with 'PIN' or 'password' in name (SecSettings)
        run: |
          echo "=== Methods containing 'Pin' in name (SecSettings) ==="
          grep -r -n ".method.*Pin" secsettings_decompiled/smali/ | head -100

      - name: Check XML resources for integer values
        run: |
          echo "=== Search integers.xml in SecSettings ==="
          find secsettings_decompiled -name "integers.xml" -exec grep -H -n "6" {} \;
          echo "=== Search config.xml in SecSettings ==="
          find secsettings_decompiled -name "config.xml" -exec grep -H -n "6" {} \;
          echo "=== Search any XML with 'pin' ==="
          find secsettings_decompiled -name "*.xml" -exec grep -i -l "pin" {} \; | head -20

      - name: Generate full report and save to artifact
        run: |
          {
            echo "=== FULL PIN CONSTANTS ANALYSIS REPORT ==="
            echo "Generated: $(date)"
            echo ""
            echo "--- All const/4 0x6 in services (first 300 lines) ---"
            grep -r -n "const/4.*0x6" services_decompiled/smali/ | head -300
            echo ""
            echo "--- All const/16 0x6 in services (first 300) ---"
            grep -r -n "const/16.*0x6" services_decompiled/smali/ | head -300
            echo ""
            echo "--- All const/4 0x6 in SecSettings (first 300) ---"
            grep -r -n "const/4.*0x6" secsettings_decompiled/smali/ | head -300
            echo ""
            echo "--- All const/16 0x6 in SecSettings (first 300) ---"
            grep -r -n "const/16.*0x6" secsettings_decompiled/smali/ | head -300
            echo ""
            echo "--- Methods with 'Pin' in name (services) ---"
            grep -r ".method.*Pin" services_decompiled/smali/ | head -100
            echo ""
            echo "--- Methods with 'Pin' in name (SecSettings) ---"
            grep -r ".method.*Pin" secsettings_decompiled/smali/ | head -100
            echo ""
            echo "--- XML resources with integer 6 ---"
            find secsettings_decompiled -name "*.xml" -exec grep -H -n ">6<" {} \; | head -50
            echo ""
            echo "--- Files with 'pin' in name (SecSettings XML) ---"
            find secsettings_decompiled -name "*.xml" | grep -i pin | head -20
          } > pin_full_report.txt

      - name: Upload all artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-analysis
          path: |
            pin_full_report.txt
            services_decompiled/
            secsettings_decompiled/
