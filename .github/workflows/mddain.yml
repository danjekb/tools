name: Find PIN constants

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download files
        run: |
          wget -O services.jar https://github.com/danjekb/tools/releases/download/1.0/services.jar
          wget -O SecSettings.apk https://github.com/danjekb/tools/releases/download/1.0/SecSettings.apk

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk

      - name: Download and setup apktool
        run: |
          wget -O apktool https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          chmod +x apktool
          sudo mv apktool /usr/local/bin/
          wget -O apktool.jar https://github.com/iBotPeaches/Apktool/releases/download/v3.0.2/apktool_3.0.2.jar
          sudo mv apktool.jar /usr/local/bin/

      - name: Decompile services.jar
        run: |
          mkdir -p services_decompiled
          cd services_decompiled
          apktool d ../services.jar

      - name: Decompile SecSettings.apk
        run: |
          mkdir -p secsettings_decompiled
          cd secsettings_decompiled
          apktool d ../SecSettings.apk

      - name: Generate analysis report
        run: |
          REPORT="pin_analysis_report.txt"
          echo "=== PIN CONSTANTS ANALYSIS REPORT ===" > $REPORT
          echo "Generated: $(date)" >> $REPORT
          echo "" >> $REPORT

          # Funkcja do dodawania sekcji
          add_section() {
            echo "=== $1 ===" >> $REPORT
            shift
            grep -n "const/4.*0x6" "$@" >> $REPORT 2>/dev/null || echo "Not found" >> $REPORT
            echo "" >> $REPORT
          }

          echo "--- Full files ---" >> $REPORT
          add_section "LockSettingsService.smali" services_decompiled/smali/com/android/server/locksettings/LockSettingsService.smali
          add_section "SyntheticPasswordManager.smali" services_decompiled/smali/com/android/server/locksettings/SyntheticPasswordManager.smali
          add_section "ChooseLockPassword\$ChooseLockPasswordFragment.smali" secsettings_decompiled/smali/com/android/settings/password/ChooseLockPassword\$ChooseLockPasswordFragment.smali

          echo "--- Method contexts ---" >> $REPORT
          echo "=== refreshStoredPinLength (LockSettingsService) ===" >> $REPORT
          sed -n '/.method public final refreshStoredPinLength(I)Z/,/.end method/p' services_decompiled/smali/com/android/server/locksettings/LockSettingsService.smali | grep -n "const/4.*0x6" >> $REPORT 2>/dev/null || echo "No 0x6 found in this method" >> $REPORT
          echo "" >> $REPORT

          echo "=== createLskfBasedProtector (SyntheticPasswordManager) ===" >> $REPORT
          sed -n '/.method public final createLskfBasedProtector(/,/.end method/p' services_decompiled/smali/com/android/server/locksettings/SyntheticPasswordManager.smali | grep -n "const/4.*0x6" >> $REPORT 2>/dev/null || echo "No 0x6 found in this method" >> $REPORT
          echo "" >> $REPORT

          echo "=== handleNext\$2 (SecSettings) ===" >> $REPORT
          sed -n '/.method public final handleNext\$2()V/,/.end method/p' secsettings_decompiled/smali/com/android/settings/password/ChooseLockPassword\$ChooseLockPasswordFragment.smali | grep -n "const/4.*0x6" >> $REPORT 2>/dev/null || echo "No 0x6 found in this method" >> $REPORT
          echo "" >> $REPORT

          echo "=== setAutoPinConfirmOption (SecSettings) ===" >> $REPORT
          sed -n '/.method public final setAutoPinConfirmOption(IZ)V/,/.end method/p' secsettings_decompiled/smali/com/android/settings/password/ChooseLockPassword\$ChooseLockPasswordFragment.smali | grep -n "const/4.*0x6" >> $REPORT 2>/dev/null || echo "No 0x6 found in this method" >> $REPORT
          echo "" >> $REPORT

          echo "--- Additional possible constants (const/16, const/4 with other registers) ---" >> $REPORT
          echo "=== const/16 0x6 in LockSettingsService ===" >> $REPORT
          grep -n "const/16.*0x6" services_decompiled/smali/com/android/server/locksettings/LockSettingsService.smali >> $REPORT 2>/dev/null || echo "Not found" >> $REPORT
          echo "" >> $REPORT

          echo "=== const/16 0x6 in SyntheticPasswordManager ===" >> $REPORT
          grep -n "const/16.*0x6" services_decompiled/smali/com/android/server/locksettings/SyntheticPasswordManager.smali >> $REPORT 2>/dev/null || echo "Not found" >> $REPORT
          echo "" >> $REPORT

          echo "=== Any '6' in choose lock password fragment (excluding comments) ===" >> $REPORT
          grep -n "\b6\b" secsettings_decompiled/smali/com/android/settings/password/ChooseLockPassword\$ChooseLockPasswordFragment.smali | grep -v "//" >> $REPORT 2>/dev/null || echo "Not found" >> $REPORT

          echo "Report saved to $REPORT"
          cat $REPORT

      - name: Upload decompiled files + report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decompiled
          path: |
            services_decompiled/
            secsettings_decompiled/
            pin_analysis_report.txt
